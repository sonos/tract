name: Full test harness

on:
  schedule:
    - cron:  '0 3 * * *'
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Optional PR number to test (from fork ok). Leave empty to run on selected branch."
        required: false
        type: number

env:
  CARGO_INCREMENTAL: false
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: true

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
    outputs:
      test_ref: ${{ steps.set.outputs.test_ref }}
      pr_number: ${{ steps.set.outputs.pr_number }}
    steps:
      - id: set
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          STATUS_CONTEXT: "CI / full"
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const prInput = context.payload.inputs?.pr_number;
            core.setOutput('pr_number', prInput ? String(prInput) : '');
            if (!prInput) {
              // Use the ref the workflow was triggered on (branch/tag/SHA in base repo)
              core.setOutput('test_ref', process.env.GITHUB_SHA);
              return;
            }
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: Number(prInput),
            });
            const sha = pr.data.head.sha;
            core.setOutput('test_ref', sha);
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state: 'pending',
              context: process.env.STATUS_CONTEXT,
              target_url: process.env.RUN_URL,
              description: 'Running',
            });

  old-harness:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    permissions:
      id-token: write
      contents: read
    needs: prepare
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        ref: ${{ needs.prepare.outputs.test_ref }}
        fetch-depth: 0
        persist-credentials: false

    - name: Configure AWS Credentials
      continue-on-error: true
      uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
      with:
        role-to-assume: arn:aws:iam::567805100031:role/github-runner-tract-ci
        aws-region: us-east-2

    - name: Full test
      run: .travis/test-harness.sh

  cli-tests:
    runs-on: ubuntu-latest
    needs: prepare

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        ref: ${{ needs.prepare.outputs.test_ref }}
        fetch-depth: 0
        persist-credentials: false
    - name: Full test 
      env:
        AWS_EC2_METADATA_DISABLED: true
      run: .travis/cli-tests.sh

  onnx-tests:
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix:
        opset: [1_4_1, 1_5_0, 1_6_0, 1_7_0, 1_8_1, 1_9_0, 1_10_2, 1_11_0, 1_12_0, 1_13_0, 1_14_1, 1_15_0, 1_16_2, 1_17_0, 1_18_0, 1_19_1]

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        ref: ${{ needs.prepare.outputs.test_ref }}
        fetch-depth: 0
        persist-credentials: false
    - name: Full test
      run: .travis/onnx-tests.sh ${{ matrix.opset }}

  tflite:
    runs-on: ubuntu-latest
    needs: prepare

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        ref: ${{ needs.prepare.outputs.test_ref }}
        fetch-depth: 0
        persist-credentials: false
    - name: Full test
      run: .travis/tflite.sh

  some-tests-with-paranoid-asserts:
    runs-on: ubuntu-latest
    needs: prepare

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        ref: ${{ needs.prepare.outputs.test_ref }}
        fetch-depth: 0
        persist-credentials: false

    - name: With assertions
      run: |
        rustup update
        cargo test --features tract-core/paranoid_assertions -p test-onnx-core -p test-unit-core

  without-default-features:
    runs-on: ubuntu-latest
    needs: prepare

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        ref: ${{ needs.prepare.outputs.test_ref }}
        fetch-depth: 0
        persist-credentials: false
    - name: Without default features
      run: |
        rustup update
        cargo check -p tract-cli --no-default-features $CARGO_EXTRA

  complexes:
    runs-on: ubuntu-latest
    needs: prepare

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        ref: ${{ needs.prepare.outputs.test_ref }}
        fetch-depth: 0
        persist-credentials: false
    - name: With complexes
      run: |
        rustup update
        cargo check -p tract-nnef --features complex $CARGO_EXTRA

  check-all-targets:
    runs-on: ubuntu-latest
    needs: prepare

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        ref: ${{ needs.prepare.outputs.test_ref }}
        fetch-depth: 0
        persist-credentials: false
    - name: Check all targets
      run: |
        ROOT=$(pwd) ./.travis/ci-system-setup.sh
        cargo check --all-targets --workspace --exclude test-metal --exclude tract-metal

  C:
    runs-on: ubuntu-latest
    needs: prepare

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        ref: ${{ needs.prepare.outputs.test_ref }}
        fetch-depth: 0
        persist-credentials: false
    - name: C smoke tests
      run: |
        cd api/c
        cargo install cbindgen
        make

  python:
    runs-on: ubuntu-latest
    needs: prepare

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        ref: ${{ needs.prepare.outputs.test_ref }}
        fetch-depth: 0
        persist-credentials: false
    - name: Setup Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: "3.13"

    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

    - name: Pytest bindings
      timeout-minutes: 60
      run: |
        cd api/py
        uv venv --python 3.13
        source .venv/bin/activate
        uv pip install -e ".[dev]"
        pytest .

  report:
    name: Report result to PR
    needs: [ prepare, old-harness, cli-tests, onnx-tests, tflite, some-tests-with-paranoid-asserts, without-default-features, complexes, check-all-targets, C, python ]
    if: ${{ always() && needs.prepare.outputs.pr_number != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
      pull-requests: write
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          NEEDS: ${{ toJSON(needs) }}
          PR_NUMBER: ${{ needs.prepare.outputs.pr_number }}
          HEAD_SHA: ${{ needs.prepare.outputs.test_ref }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          STATUS_CONTEXT: "CI / full"
        with:
          script: |
            const needs = JSON.parse(process.env.NEEDS);
            const prNumber = Number(process.env.PR_NUMBER);
            const sha = process.env.HEAD_SHA;
            const runUrl = process.env.RUN_URL;
            const statusContext = process.env.STATUS_CONTEXT;
            const icon = r => r === 'success' ? '✅' : r === 'skipped' ? '⏭️' : '❌';
            const jobs = Object.entries(needs).filter(([k]) => k !== 'prepare');
            const failed = jobs.filter(([, v]) => v.result !== 'success' && v.result !== 'skipped');
            const state = failed.length ? 'failure' : 'success';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner, repo: context.repo.repo, sha, state,
              context: statusContext, target_url: runUrl,
              description: failed.length ? `${failed.length} job(s) failed` : 'All jobs passed',
            });
            const marker = `<!-- ${statusContext} -->`;
            const body = [
              marker,
              `### ${icon(state)} ${statusContext}: ${state}`,
              '',
              ...jobs.map(([k, v]) => `- ${icon(v.result)} \`${k}\`: ${v.result}`),
              '',
              `[View workflow run](${runUrl})`,
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber, per_page: 100,
            });
            const prev = comments.find(c => c.body?.includes(marker));
            if (prev) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: prev.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber, body });
            }
