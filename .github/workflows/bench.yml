name: Bench

# Build tract on GitHub-hosted runners, run the bench suite on the self-hosted bench
# machines, and either (nightly) append one row per run to the bench-data branch, or
# (PR) compare against that reference and post a single fan-in comment.
# The Jetson (aarch64 + CUDA 12) can't be built on a hosted runner natively, so it
# reuses cross.sh's debian-stretch cross-build (no AWS creds, so the S3-push tail stays off).

on:
  schedule:
    - cron: '0 4 * * *'   # after large-models (3am) so they don't fight for the self-hosted boxes
  workflow_dispatch:
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'doc/**'

permissions:
  contents: read

concurrency:
  # cancel superseded PR pushes (escape hatch); nightly keys on run_id so it never cancels
  group: bench-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.gate.outputs.enabled }}
      ref: ${{ steps.gate.outputs.ref }}
      day: ${{ steps.gate.outputs.day }}
    steps:
      - id: gate
        env:
          BENCH_ENABLED: ${{ vars.BENCH_ENABLED }}
        run: |
          if [ "$BENCH_ENABLED" = "false" ]; then
            echo "::notice::bench disabled via BENCH_ENABLED repo variable"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi
          echo "ref=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
          echo "day=$(date -u +%F)" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    if: needs.prepare.outputs.enabled == 'true'
    runs-on: ${{ matrix.host }}
    permissions:
      contents: read
      packages: read      # pull the prebuilt cross-build image (ghcr, private)
    strategy:
      fail-fast: false
      matrix:
        include:
          - triple: aarch64-apple-darwin
            host: macos-latest
            build: ROOT=. ./.travis/ci-system-setup.sh && cargo build -p tract-cli --release --features bench-suite
            bin: target/release/tract
          - triple: x86_64-unknown-linux-gnu
            host: ubuntu-latest
            build: ROOT=. ./.travis/ci-system-setup.sh && cargo build -p tract-cli --release --features bench-suite
            bin: target/release/tract
          - triple: aarch64-unknown-linux-gnu-stretch
            host: ubuntu-latest
            build: CARGO_TARGET_DIR=.cross-cache/target PLATFORM=aarch64-unknown-linux-gnu-stretch ./.travis/cross.sh
            bin: .cross-cache/target/aarch64-unknown-linux-gnu/release/tract
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.ref }}
          persist-credentials: false
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          # per-PR build on the developer feedback path; PR runs restore but only main saves.
          # The stretch leg cross-builds in a debian-stretch container into .cross-cache/target
          # (CARGO_TARGET_DIR); cache that verbatim so the container's aarch64 artifacts survive —
          # rust-cache's own target/ cleanup is host-target-only and would drop them. The container
          # also bind-mounts the host cargo registry (see cross.sh) so crate downloads persist.
          key: ${{ matrix.triple }}
          cache-directories: .cross-cache/target
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: ${{ matrix.build }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # ghcr login for the cross-build image
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tract-cli-${{ matrix.triple }}
          path: ${{ matrix.bin }}

  bench:
    needs: [ prepare, build ]
    if: needs.prepare.outputs.enabled == 'true'
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write     # push to bench-data (nightly only)
    concurrency:
      group: bench-runner-${{ matrix.runner }}   # one bench per box at a time; never fight a running bench
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: apple-m1-max
            runner: macOS
            triple: aarch64-apple-darwin
          - target: i9-11900kb_rtx-4060
            runner: cuda-lovelace
            triple: x86_64-unknown-linux-gnu
          - target: jetson-orin-nx
            runner: orin-nx-16g
            triple: aarch64-unknown-linux-gnu-stretch
            # GPU-only box: its arm64 CPU is redundant with apple-m1-max for the net
            # suite, so skip CPU runs and bench only the Orin GPU (cuda).
            bench_args: --skip-cpu
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.ref }}
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: tract-cli-${{ matrix.triple }}
          path: tract-cli
      # Read-only bench-data checkout: the orchestrator builds this device's retry
      # expectations from it inline (no separate job, no Python on the runner).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: bench-data
          path: bench-ref
          fetch-depth: 1
          persist-credentials: false
      - name: Run bench suite
        env:
          TRIPLE: ${{ matrix.triple }}
          DEVICE: ${{ matrix.target }}
        run: |
          chmod +x tract-cli/tract
          # no --cache-dir: honor each runner's CACHEDIR env (its curated model cache),
          # falling back to ~/.cache/tract-ci-minion-models, like the old bundle did.
          # ${{ matrix.bench_args }} is empty except on jetson (--skip-cpu).
          # Reference (nightly/dispatch) records the per-metric median of N samples so a
          # lone clock glitch can't poison it; PR runs omit --samples and retry-until-good.
          tract-cli/tract bench-suite \
            --manifest .travis/benches.toml \
            --bench-data bench-ref \
            --thresholds .travis/bench-thresholds.toml \
            --triple "$TRIPLE" --device "$DEVICE" \
            ${{ github.event_name != 'pull_request' && '--samples 5' || '' }} \
            ${{ matrix.bench_args }}        # produces ./metrics

      # --- nightly / dispatch: append the row to bench-data ---
      - name: Checkout bench-data
        if: github.event_name != 'pull_request'
        # zizmor: ignore[artipacked] credentials are needed to push the row back to
        # bench-data; this checkout is never uploaded as an artifact.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: bench-data
          path: bench-data
          fetch-depth: 1
      - name: Append and push
        if: github.event_name != 'pull_request'
        env:
          DEVICE: ${{ matrix.target }}
          TRIPLE: ${{ matrix.triple }}
          REF: ${{ needs.prepare.outputs.ref }}
          DAY: ${{ needs.prepare.outputs.day }}
        run: |
          tract-cli/tract bench-append --metrics metrics --out bench-data \
            --triple "$TRIPLE" --device "$DEVICE" --day "$DAY"
          cd bench-data
          git config user.name "tract-ci"
          git config user.email "tract-ci@users.noreply.github.com"
          git add -A
          git commit -m "bench: $DEVICE $DAY ${REF:0:9}"
          for i in 1 2 3 4 5; do
            git push origin HEAD:bench-data && exit 0
            git fetch origin bench-data
            git rebase origin/bench-data || git rebase --abort
          done
          echo "push failed after retries" >&2; exit 1

      # --- PR: emit this device's result for the fan-in report job ---
      - name: Stage PR result
        if: github.event_name == 'pull_request'
        env:
          DEVICE: ${{ matrix.target }}
          TRIPLE: ${{ matrix.triple }}
        run: |
          mkdir -p result
          cp metrics result/metrics
          printf '{"device":"%s","triple":"%s"}\n' "$DEVICE" "$TRIPLE" > result/meta.json
      - name: Upload PR result
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bench-result-${{ matrix.target }}
          path: result

  # --- ARM embedded "dinghy target" fleet (opt-in via the BENCH_DINGHY_ENABLED repo variable) ---
  # A dinghy target is an embedded board that cannot host a runner or build. A sidekick runner
  # receives the static musl CLI, dispatches the run onto the board over dinghy's ssh transport, and
  # captures every byte locally. Everything device-specific — address, working dir, OS, the model mirror
  # URL and cpu governor — lives in the sidekick's own .dinghy.toml (ssh device coords + remote_shell_vars)
  # and is expanded into the run out of band, so none of it reaches this file or the public run log.
  # Gated off until a sidekick runner is registered, so a missing self-hosted runner cannot wedge PRs.

  build-dinghy:
    needs: prepare
    if: ${{ needs.prepare.outputs.enabled == 'true' && vars.BENCH_DINGHY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - triple: aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.ref }}
          persist-credentials: false
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.triple }}
          cache-directories: .cross-cache/target
          save-if: ${{ github.ref == 'refs/heads/main' }}
      # Static musl CLI for the board: bench-suite on, cuda/tflite off; SKIP_QEMU_TEST builds only.
      - run: >-
          SKIP_QEMU_TEST=skip SUDO=sudo CARGO_TARGET_DIR=.cross-cache/target
          TRACT_CLI_FEATURES=onnx,tf,pulse,pulse-opl,transformers,extra,bench-suite
          PLATFORM=${{ matrix.triple }} ./.travis/cross.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tract-cli-${{ matrix.triple }}
          path: .cross-cache/target/${{ matrix.triple }}/release/tract

  bench-dinghy:
    needs: [ prepare, build-dinghy ]
    if: ${{ needs.prepare.outputs.enabled == 'true' && vars.BENCH_DINGHY_ENABLED == 'true' }}
    # One sidekick runner per target (label per board), so boards bench in parallel.
    runs-on: ${{ matrix.runner }}
    # Bound the run so an offline/stuck target can't hang the PR report (which fans this in).
    timeout-minutes: 120
    concurrency:
      group: bench-dinghy-${{ matrix.device }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        include:
          - device: cortex-a55
            triple: aarch64-unknown-linux-musl
            runner: dinghy-sidekick-a55   # the self-hosted runner that dispatches to this board
            dinghy_target: dinghy-a55     # opaque alias -> the sidekick-local .dinghy.toml ssh_devices key
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.ref }}
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: tract-cli-${{ matrix.triple }}
          path: tract-cli
      - name: Bench on the dinghy target
        env:
          DINGHY_TARGET: ${{ matrix.dinghy_target }}
          DEVICE: ${{ matrix.device }}
          TRIPLE: ${{ matrix.triple }}
          SAMPLES: ${{ github.event_name != 'pull_request' && '--samples 5' || '' }}
        run: |
          chmod +x tract-cli/tract
          mkdir -p result
          # Everything the board / dinghy / ssh emit is captured to files here and never re-echoed:
          # the public run log must not leak the board's address, working dir or OS. bench-suite emits
          # metric JSONL on stdout and all progress on stderr. The single-quoted '${...}' args reach
          # dinghy verbatim and are expanded from the ssh device's remote_shell_vars (sidekick-local),
          # so the model mirror URL and governor stay local and never hit this file or the run log.
          # --no-cache streams each model straight from the mirror into tract: the board is read-only,
          # so there is no on-disk model cache.
          if CARGO_PKG_NAME=tract cargo-dinghy -d "$DINGHY_TARGET" runner \
               ./tract-cli/tract -- bench-suite \
               --manifest .travis/benches.toml --skip-runtimes --no-cache --output - $SAMPLES \
               --base-url '${TRACT_BENCH_BASE_URL}' --cpu-governor '${TRACT_BENCH_CPU_GOVERNOR}' \
               >captured.out 2>captured.err
          then
            grep '"metric"' captured.out > result/metrics || true
          else
            echo "::error::bench-dinghy: run failed on the target (details in the sidekick-local log)"
            exit 1
          fi
          test -s result/metrics || { echo "::error::bench-dinghy: no metrics captured"; exit 1; }
          printf '{"device":"%s","triple":"%s"}\n' "$DEVICE" "$TRIPLE" > result/meta.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bench-result-${{ matrix.device }}
          path: result

  # Nightly only: append the dinghy target's row to bench-data. The board can't run the append tool,
  # so a hosted job does it with the x86 CLI (bench-append is arch-agnostic JSON) reading the JSONL result.
  append-dinghy:
    needs: [ prepare, build, bench-dinghy ]
    if: ${{ github.event_name != 'pull_request' && needs.prepare.outputs.enabled == 'true' && vars.BENCH_DINGHY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - device: cortex-a55
            triple: aarch64-unknown-linux-musl
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: tract-cli-x86_64-unknown-linux-gnu
          path: tract-cli
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bench-result-${{ matrix.device }}
          path: result
      # zizmor: ignore[artipacked] credentials are needed to push the row back to bench-data;
      # this checkout is never uploaded as an artifact.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: bench-data
          path: bench-data
          fetch-depth: 1
      - name: Append and push
        env:
          DEVICE: ${{ matrix.device }}
          TRIPLE: ${{ matrix.triple }}
          REF: ${{ needs.prepare.outputs.ref }}
          DAY: ${{ needs.prepare.outputs.day }}
        run: |
          chmod +x tract-cli/tract
          tract-cli/tract bench-append --metrics result/metrics --out bench-data \
            --triple "$TRIPLE" --device "$DEVICE" --day "$DAY"
          cd bench-data
          git config user.name "tract-ci"
          git config user.email "tract-ci@users.noreply.github.com"
          git add -A
          git commit -m "bench: $DEVICE $DAY ${REF:0:9}"
          for i in 1 2 3 4 5; do
            git push origin HEAD:bench-data && exit 0
            git fetch origin bench-data
            git rebase origin/bench-data || git rebase --abort
          done
          echo "push failed after retries" >&2; exit 1

  report:
    needs: [ prepare, build, bench, bench-dinghy ]
    # always() so a single cancelled or failed device leg still yields a report from the
    # devices that did finish (cancelling one flaky board must not suppress the whole comment).
    # Safe against a vacuous "no regressions" comment: bench-report writes no file when there is
    # nothing to compare and both post steps are gated on that file, so a fully-cancelled run
    # (nothing uploaded) posts nothing. The prepare-enabled gate still skips report when the run
    # was cancelled early enough to take out prepare.
    if: ${{ always() && github.event_name == 'pull_request' && needs.prepare.outputs.enabled == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # post the comment directly on same-repo PRs
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.ref }}
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: bench-result-*
          path: results
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: tract-cli-x86_64-unknown-linux-gnu
          path: tract-cli
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: bench-data
          path: bench-data
          fetch-depth: 1
          persist-credentials: false
      - name: Render comparison
        env:
          PR_SHA: ${{ needs.prepare.outputs.ref }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          chmod +x tract-cli/tract
          tract-cli/tract bench-report --results results --bench-data bench-data \
            --thresholds .travis/bench-thresholds.toml --pr-sha "$PR_SHA" --out pr-comment.md
      # Same-repo PRs have a write token: post directly here so the comment refreshes on every
      # run, including manual re-runs (a re-run does not re-fire the workflow_run trampoline).
      - name: Comment on PR (same-repo)
        if: ${{ hashFiles('pr-comment.md') != '' && github.event.pull_request.head.repo.full_name == github.repository }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('pr-comment.md', 'utf8');
            const issue_number = parseInt(process.env.PR_NUMBER, 10);
            const marker = '<!-- bench-vs-main -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number, per_page: 100,
            });
            const prev = comments.find(c => c.body?.includes(marker));
            if (prev) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: prev.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number, body });
            }
      # Fork PRs get a read-only token and can't comment, so hand the rendered comment + target PR
      # to the bench-comment trampoline (workflow_run, base context, write token) to post instead.
      - name: Stage comment for the trampoline (fork PRs)
        if: ${{ hashFiles('pr-comment.md') != '' && github.event.pull_request.head.repo.full_name != github.repository }}
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          mkdir -p bench-comment
          mv pr-comment.md bench-comment/
          printf '%s\n' "$PR_NUMBER" > bench-comment/pr-number
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ hashFiles('bench-comment/pr-comment.md') != '' }}
        with:
          name: bench-comment
          path: bench-comment
