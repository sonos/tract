name: Large models

on:
  schedule:
    - cron:  '0 3 * * *'
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Optional PR number to test (from fork ok). Leave empty to run on selected branch."
        required: false
        type: number

env:
  LARGE_MODELS: true

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
    outputs:
      test_ref: ${{ steps.set.outputs.test_ref }}
      pr_number: ${{ steps.set.outputs.pr_number }}
    steps:
      - id: set
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          STATUS_CONTEXT: "CI / large-models"
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const prInput = context.payload.inputs?.pr_number;
            core.setOutput('pr_number', prInput ? String(prInput) : '');
            if (!prInput) {
              core.setOutput('test_ref', process.env.GITHUB_SHA);
              return;
            }
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: Number(prInput),
            });
            const sha = pr.data.head.sha;
            core.setOutput('test_ref', sha);
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state: 'pending',
              context: process.env.STATUS_CONTEXT,
              target_url: process.env.RUN_URL,
              description: 'Running',
            });

  cli:
    name: Build tract on ${{ matrix.os }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ macos-latest, ubuntu-latest ]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.prepare.outputs.test_ref }}
          fetch-depth: 0
          persist-credentials: false
      - run: |
          ROOT=. ./.travis/ci-system-setup.sh
          cargo build -p tract-cli --profile opt-no-lto --no-default-features --features transformers,pulse,cuda-13000
      - run: echo uname=$(uname) >> $GITHUB_ENV
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: tract-cli-${{env.uname}}
          path: ./target/opt-no-lto/tract

  foundation-llms:
    needs: prepare
    runs-on: ubuntu-latest
    outputs:
      models: ${{steps.set-matrix.outputs.models}}
      q: ${{steps.set-matrix.outputs.q}}

    steps:
      - id: set-matrix
        env:
          FULL: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
        run: |
          if [ "$FULL" = "true" ]
          then
            echo 'models=[ "openelm-270M", "llama-3.2-1B-instruct", "llama-3.2-3B-instruct", "llama-3.1-8B-instruct", "qwen3-1.7B", "qwen3-8B" ]' >> $GITHUB_OUTPUT
            echo 'q=[ "f16f16", "f32f32", "q40ef16" ]' >> $GITHUB_OUTPUT
          else
            echo ::notice::Skipping most checks on PR and commit. Dispatch workflow manually if needed.
            echo 'models=[ "llama-3.2-1B-instruct" ]' >> $GITHUB_OUTPUT
            echo 'q=[ "f32f32", "q40ef16" ]' >> $GITHUB_OUTPUT
          fi

  foundation-llm:
    name: ${{ matrix.os }} / ${{matrix.rt}} / ${{ matrix.model }} / ${{ matrix.q }}
    needs: [ prepare, cli, foundation-llms ]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ macOS, cuda-lovelace ]
        model: ${{fromJson(needs.foundation-llms.outputs.models)}}
        q: ${{fromJson(needs.foundation-llms.outputs.q)}}
        rt: [ cpu, gpu ]
        exclude:
          - model: openelm-270M
            q: f32f32
          - model: Llama-3.2-3B-Instruct
            q: f32f32
          - model: Llama-3.2-3B-Instruct
            q: f32f32
          - model: Llama-3.1-8B-Instruct
            q: f32f32
          - model: Qwen3-1.7B
            q: f32f32
          - model: Qwen3-8B
            q: f32f32
          - model: OpenELM-270M
            q: f32f32
      fail-fast: false
    permissions:
      id-token: write
      contents: read

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        ref: ${{ needs.prepare.outputs.test_ref }}
        fetch-depth: 0
        persist-credentials: false
    - name: Configure AWS Credentials
      continue-on-error: true
      uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
      with:
        role-to-assume: arn:aws:iam::567805100031:role/github-runner-tract-ci
        aws-region: us-east-2
    - run: echo uname=$(uname) >> $GITHUB_ENV
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        name: tract-cli-${{env.uname}}
        path: tract-cli-${{env.uname}}

    - name: Download and run
      env:
        UNAME: ${{ env.uname }}
        RT_MATRIX: ${{ matrix.rt }}
        MODEL: ${{ matrix.model }}
        Q: ${{ matrix.q }}
      run: |
        chmod +x "tract-cli-${UNAME}/tract"
        export TRACT_RUN="$GITHUB_WORKSPACE/tract-cli-${UNAME}/tract"
        if [ "$RT_MATRIX" = "gpu" ]
        then
          case $(uname) in
            Darwin) RT=metal;;
            Linux) RT=cuda;;
          esac
        fi
        .travis/test-llm.sh "$MODEL" "$Q" "$RT"

  parakeet-tdt-600m-v3:
    name: ${{matrix.os}} / Parakeet TDT 600m v3
    needs: [ prepare, cli ]
    strategy:
      matrix:
        os: [ macOS, cuda-lovelace ]
      fail-fast: false
    permissions:
      id-token: write
      contents: read
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        ref: ${{ needs.prepare.outputs.test_ref }}
        fetch-depth: 0
        persist-credentials: false
    - run: echo uname=$(uname) >> $GITHUB_ENV
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        name: tract-cli-${{env.uname}}
        path: tract-cli-${{env.uname}}

    - name: Download and run
      env:
        UNAME: ${{ env.uname }}
      run: |
        chmod +x "tract-cli-${UNAME}/tract"
        export TRACT_RUN="$GITHUB_WORKSPACE/tract-cli-${UNAME}/tract"
        ./harness/parakeet-tdt-600m-v3/ci.sh

  nemotron-speech-streaming-en-06b:
    name: ${{matrix.os}} / Nemotron speech streaming en 0.6b
    needs: [ prepare, cli ]
    strategy:
      matrix:
        os: [ macOS, cuda-lovelace ]
      fail-fast: false
    permissions:
      id-token: write
      contents: read
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        ref: ${{ needs.prepare.outputs.test_ref }}
        fetch-depth: 0
        persist-credentials: false
    - run: echo uname=$(uname) >> $GITHUB_ENV
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        name: tract-cli-${{env.uname}}
        path: tract-cli-${{env.uname}}

    - name: Download and run
      env:
        UNAME: ${{ env.uname }}
      run: |
        chmod +x "tract-cli-${UNAME}/tract"
        export TRACT_RUN="$GITHUB_WORKSPACE/tract-cli-${UNAME}/tract"
        ./harness/nemotron-speech-streaming-en-0.6b/ci.sh

  report:
    name: Report result to PR
    needs: [ prepare, cli, foundation-llms, foundation-llm, parakeet-tdt-600m-v3, nemotron-speech-streaming-en-06b ]
    if: ${{ always() && needs.prepare.outputs.pr_number != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
      pull-requests: write
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          NEEDS: ${{ toJSON(needs) }}
          PR_NUMBER: ${{ needs.prepare.outputs.pr_number }}
          HEAD_SHA: ${{ needs.prepare.outputs.test_ref }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          STATUS_CONTEXT: "CI / large-models"
        with:
          script: |
            const needs = JSON.parse(process.env.NEEDS);
            const prNumber = Number(process.env.PR_NUMBER);
            const sha = process.env.HEAD_SHA;
            const runUrl = process.env.RUN_URL;
            const statusContext = process.env.STATUS_CONTEXT;
            const icon = r => r === 'success' ? '✅' : r === 'skipped' ? '⏭️' : '❌';
            const jobs = Object.entries(needs).filter(([k]) => k !== 'prepare');
            const failed = jobs.filter(([, v]) => v.result !== 'success' && v.result !== 'skipped');
            const state = failed.length ? 'failure' : 'success';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner, repo: context.repo.repo, sha, state,
              context: statusContext, target_url: runUrl,
              description: failed.length ? `${failed.length} job(s) failed` : 'All jobs passed',
            });
            const marker = `<!-- ${statusContext} -->`;
            const body = [
              marker,
              `### ${icon(state)} ${statusContext}: ${state}`,
              '',
              ...jobs.map(([k, v]) => `- ${icon(v.result)} \`${k}\`: ${v.result}`),
              '',
              `[View workflow run](${runUrl})`,
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber, per_page: 100,
            });
            const prev = comments.find(c => c.body?.includes(marker));
            if (prev) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: prev.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber, body });
            }
