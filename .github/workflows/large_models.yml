name: Large models

on:
  pull_request:
  schedule:
    - cron:  '0 3 * * *'
  workflow_dispatch:

env:
  LARGE_MODELS: true
  
jobs:
  cli: 
    name: Build tract on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ macos-latest, ubuntu-latest ]
    steps:
      - uses: actions/checkout@v4
      - run: |
          ROOT=. ./.travis/ci-system-setup.sh
          cargo build -p tract --profile opt-no-lto --no-default-features --features transformers
      - run: echo uname=$(uname) >> $GITHUB_ENV
      - uses: actions/upload-artifact@v4
        with:
          name: tract-cli-${{env.uname}}
          path: ./target/opt-no-lto/tract

  foundation-llms:
    runs-on: ubuntu-latest
    outputs:
      models: ${{steps.set-matrix.outputs.models}}
      q: ${{steps.set-matrix.outputs.q}}

    steps:
      - id: set-matrix
        env:
          FULL: $((github.event.workflow_dispatch || github.event.schedule ))
        run: |
          if [ "$FULL" = "true" ]
          then
            echo 'models=[ "openelm-270M", "llama-3.2-1B-instruct", "llama-3.2-3B-instruct", "llama-3.1-8B-instruct", "qwen2.5-7B-instruct", "qwen3-1.7B", "qwen3-8B" ]' >> $GITHUB_OUTPUT
            echo 'q=[ "f16f16", "f32f32", "q40ef16" ]' >> $GITHUB_OUTPUT
          else
            echo ::notice::Skipping most checks on PR and commit. Dispatch workflow manually if needed.
            echo 'models=[ "llama-3.2-1B-instruct" ]' >> $GITHUB_OUTPUT
            echo 'q=[ "f32f32", "q40ef16" ]' >> $GITHUB_OUTPUT
          fi

  foundation-llm:
    name: ${{ matrix.os }} / ${{matrix.rt}} / ${{ matrix.model }} / ${{ matrix.q }}
    needs: [ cli, foundation-llms ]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ macOS, cuda-lovelace ]
        model: ${{fromJson(needs.foundation-llms.outputs.models)}}
        q: ${{fromJson(needs.foundation-llms.outputs.q)}}
        rt: [ cpu, gpu ]
      fail-fast: false
    permissions:
      id-token: write
      contents: read

    steps:
    - uses: actions/checkout@v4
    - run: echo uname=$(uname) >> $GITHUB_ENV
    - uses: actions/download-artifact@v4.1.7
      with:
        pattern: tract-cli-${{env.uname}}

    - name: Download and run
      run: |
        chmod +x tract-cli-${{env.uname}}/tract
        export TRACT_RUN=$GITHUB_WORKSPACE/tract-cli-${{env.uname}}/tract
        if "${{matrix.rt}}" = "gpu" ]
        then
          case $(uname) in
            Darwin) RT=metal;;
            Linux) RT=cuda;;
          esac
        fi
        .travis/test-llm.sh ${{matrix.model}} ${{matrix.q}} $RT

  parakeet-tdt-600m-v3:
    name: ${{matrix.os}} / Parakeet TDT 600m v3
    needs: [ cli ]
    strategy:
      matrix:
        os: [ macOS, cuda-lovelace ]
      fail-fast: false
    permissions:
      id-token: write
      contents: read
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    - run: echo uname=$(uname) >> $GITHUB_ENV
    - uses: actions/download-artifact@v4.1.7
      with:
        pattern: tract-cli-${{env.uname}}

    - name: Download and run
      run: |
        chmod +x tract-cli-${{env.uname}}/tract
        export TRACT_RUN=$GITHUB_WORKSPACE/tract-cli-${{env.uname}}/tract
        ./harness/parakeet-tdt-600m-v3/ci.sh

