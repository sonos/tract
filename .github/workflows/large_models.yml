name: Large models

on:
  pull_request:
  schedule:
    - cron:  '0 3 * * *'
  workflow_dispatch:

env:
  CARGO_INCREMENTAL: false
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: true

jobs:
  cli: 
    name: Build tract on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ macos-latest, ubuntu-latest ]
    steps:
      - uses: actions/checkout@v4
      - run: |
          ./.travis/ci-system-setup.sh
          cargo build -p tract --release --no-default-features --features transformers
      - run: echo uname=$(uname) >> $GITHUB_ENV
      - uses: actions/upload-artifact@v4
        with:
          name: tract-cli-${{env.uname}}
          path: ./target/release/tract

  foundation-llms:
    name: ${{ matrix.os }} / ${{ matrix.model }} / ${{ matrix.q }}
    needs: [ cli ]
    runs-on: ${{ matrix.os }}-latest
    strategy:
      matrix:
        os: [ macOS, cuda-lovelace ]
        model: [ openelm-270M, llama-3.2-1B-instruct, llama-3.2-3B-instruct, llama-3.1-8B-instruct, qwen2.5-7B-instruct, qwen3-1.7B, qwen3-8B ]
        q: [ f16f16, f32f32, q40ef16 ]
      fail-fast: false
    permissions:
      id-token: write
      contents: read

    steps:
    - uses: actions/checkout@v4
    - run: echo uname=$(uname) >> $GITHUB_ENV
    - uses: actions/download-artifact@v4.1.7
      with:
        pattern: tract-cli-${{env.uname}}

    - name: Download and run
      run: |
        chmod +x tract-cli-${{matrix.os}}/tract
        export TRACT_RUN=$GITHUB_WORKSPACE/tract-cli-${{matrix.os}}/tract
        case $(uname) in
          Darwin) RT=metal;;
          Linux) RT=cuda;;
        esac
        .travis/test-llm.sh ${{matrix.model}} ${{matrix.q}} $RT
        .travis/test-llm.sh ${{matrix.model}} ${{matrix.q}}

  parakeet-tdt-600m-v3:
    name: ${{matrix.os}} / Parakeet TDT 600m v3
    needs: [ cli ]
    strategy:
      matrix:
        os: [ macOS, cuda-lovelace ] # these are self hosted, with metal / cuda
      fail-fast: false
    permissions:
      id-token: write
      contents: read
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    - run: echo uname=$(uname) >> $GITHUB_ENV
    - uses: actions/download-artifact@v4.1.7
      with:
        pattern: tract-cli-${{env.uname}}

    - name: Download and run
      run: |
        chmod +x tract-cli-${{env.OS}}/tract
        export TRACT_RUN=$GITHUB_WORKSPACE/tract-cli-${{env.OS}}/tract
        ./harness/parakeet-tdt-600m-v3/ci.sh

