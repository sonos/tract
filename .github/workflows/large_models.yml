name: Large models

on:
  pull_request:
  schedule:
    - cron:  '0 3 * * *'
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Optional PR number to test (from fork ok). Leave empty to run on selected branch."
        required: false
        type: number

env:
  LARGE_MODELS: true

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      test_ref: ${{ steps.set.outputs.test_ref }}
    steps:
      - id: set
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const prInput = context.payload.inputs?.pr_number ?? context.payload.pull_request?.number;
            let ref;
            if (prInput) {
              const pr = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: Number(prInput),
              });
              ref = pr.data.head.sha;
            } else {
              ref = process.env.GITHUB_SHA;
            }
            core.info(`test_ref: ${ref}`);
            core.setOutput('test_ref', ref);

  cli:
    name: Build tract on ${{ matrix.os }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ macos-latest, ubuntu-latest ]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.test_ref }}
          fetch-depth: 0
          persist-credentials: false
      - run: |
          ROOT=. ./.travis/ci-system-setup.sh
          cargo build -p tract-cli --profile opt-no-lto --no-default-features --features transformers,pulse,cuda-13000
      - run: echo uname=$(uname) >> $GITHUB_ENV
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: tract-cli-${{env.uname}}
          path: ./target/opt-no-lto/tract

  foundation-llms:
    needs: prepare
    runs-on: ubuntu-latest
    outputs:
      models: ${{steps.set-matrix.outputs.models}}
      q: ${{steps.set-matrix.outputs.q}}

    steps:
      - id: set-matrix
        env:
          FULL: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
        run: |
          if [ "$FULL" = "true" ]
          then
            echo 'models=[ "openelm-270M", "llama-3.2-1B-instruct", "llama-3.2-3B-instruct", "llama-3.1-8B-instruct", "qwen3-1.7B", "qwen3-8B" ]' >> $GITHUB_OUTPUT
            echo 'q=[ "f16f16", "f32f32", "q40ef16" ]' >> $GITHUB_OUTPUT
          else
            echo ::notice::Skipping most checks on PR and commit. Dispatch workflow manually if needed.
            echo 'models=[ "llama-3.2-1B-instruct" ]' >> $GITHUB_OUTPUT
            echo 'q=[ "f32f32", "q40ef16" ]' >> $GITHUB_OUTPUT
          fi

  foundation-llm:
    name: ${{ matrix.os }} / ${{matrix.rt}} / ${{ matrix.model }} / ${{ matrix.q }}
    needs: [ prepare, cli, foundation-llms ]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ macOS, cuda-lovelace ]
        model: ${{fromJson(needs.foundation-llms.outputs.models)}}
        q: ${{fromJson(needs.foundation-llms.outputs.q)}}
        rt: [ cpu, gpu ]
        exclude:
          - model: openelm-270M
            q: f32f32
          - model: Llama-3.2-3B-Instruct
            q: f32f32
          - model: Llama-3.2-3B-Instruct
            q: f32f32
          - model: Llama-3.1-8B-Instruct
            q: f32f32
          - model: Qwen3-1.7B
            q: f32f32
          - model: Qwen3-8B
            q: f32f32
          - model: OpenELM-270M
            q: f32f32
      fail-fast: false
    permissions:
      id-token: write
      contents: read

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ needs.prepare.outputs.test_ref }}
        fetch-depth: 0
        persist-credentials: false
    - name: Configure AWS Credentials
      continue-on-error: true
      uses: aws-actions/configure-aws-credentials@acca2b1b2070338fb9fd1ca27ecee81d687e58e5 # v6.1.2
      with:
        role-to-assume: arn:aws:iam::567805100031:role/github-runner-tract-ci
        aws-region: us-east-2
    - run: echo uname=$(uname) >> $GITHUB_ENV
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        name: tract-cli-${{env.uname}}
        path: tract-cli-${{env.uname}}

    - name: Download and run
      env:
        UNAME: ${{ env.uname }}
        RT_MATRIX: ${{ matrix.rt }}
        MODEL: ${{ matrix.model }}
        Q: ${{ matrix.q }}
      run: |
        chmod +x "tract-cli-${UNAME}/tract"
        export TRACT_RUN="$GITHUB_WORKSPACE/tract-cli-${UNAME}/tract"
        if [ "$RT_MATRIX" = "gpu" ]
        then
          case $(uname) in
            Darwin) RT=metal;;
            Linux) RT=cuda;;
          esac
        fi
        .travis/test-llm.sh "$MODEL" "$Q" "$RT"

  parakeet-tdt-600m-v3:
    name: ${{matrix.os}} / Parakeet TDT 600m v3
    needs: [ prepare, cli ]
    strategy:
      matrix:
        os: [ macOS, cuda-lovelace ]
      fail-fast: false
    permissions:
      id-token: write
      contents: read
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ needs.prepare.outputs.test_ref }}
        fetch-depth: 0
        persist-credentials: false
    - run: echo uname=$(uname) >> $GITHUB_ENV
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        name: tract-cli-${{env.uname}}
        path: tract-cli-${{env.uname}}

    - name: Download and run
      env:
        UNAME: ${{ env.uname }}
      run: |
        chmod +x "tract-cli-${UNAME}/tract"
        export TRACT_RUN="$GITHUB_WORKSPACE/tract-cli-${UNAME}/tract"
        ./harness/parakeet-tdt-600m-v3/ci.sh

  nemotron-speech-streaming-en-06b:
    name: ${{matrix.os}} / Nemotron speech streaming en 0.6b
    needs: [ prepare, cli ]
    strategy:
      matrix:
        os: [ macOS, cuda-lovelace ]
      fail-fast: false
    permissions:
      id-token: write
      contents: read
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ needs.prepare.outputs.test_ref }}
        fetch-depth: 0
        persist-credentials: false
    - run: echo uname=$(uname) >> $GITHUB_ENV
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        name: tract-cli-${{env.uname}}
        path: tract-cli-${{env.uname}}

    - name: Download and run
      env:
        UNAME: ${{ env.uname }}
      run: |
        chmod +x "tract-cli-${UNAME}/tract"
        export TRACT_RUN="$GITHUB_WORKSPACE/tract-cli-${UNAME}/tract"
        ./harness/nemotron-speech-streaming-en-0.6b/ci.sh
