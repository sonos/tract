name: Bench comment

# Trampoline for the Bench report. The Bench workflow runs on `pull_request`, which gets
# a read-only token on fork PRs and so cannot comment. It instead uploads the rendered
# comparison as the `bench-comment` artifact; this workflow runs on `workflow_run` (base
# context, write token) and posts it — working for fork and same-repo PRs alike.
#
# Security: the target PR is resolved from the triggering run's head SHA, never from
# artifact contents, so a fork cannot redirect the comment at another issue. The artifact
# only carries the comment body (a bench table rendered by our own tooling).

# Hardened: no fork code is checked out or run here; the target PR comes from the run's
# head SHA (not the artifact), and the token only posts a comment. workflow_run is the only
# way to get a write token for fork-PR comments.
on:  # zizmor: ignore[dangerous-triggers]
  workflow_run:
    workflows: ["Bench"]
    types: [completed]
  # Re-runs of the Bench workflow do not re-fire workflow_run, so a re-run never posts. This
  # lets a maintainer re-post from an already-finished Bench run (reusing its artifact) without
  # re-running the bench or pushing a commit: `gh workflow run bench-comment.yml -f run_id=<id>`.
  workflow_dispatch:
    inputs:
      run_id:
        description: "Bench run id to (re)post the comment from"
        required: true

permissions:
  contents: read
  actions: read           # download the artifact from the triggering run
  pull-requests: write    # post the comment

jobs:
  comment:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.event == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        continue-on-error: true   # no artifact => nothing comparable => nothing to post
        with:
          name: bench-comment
          path: bench-comment
          run-id: ${{ github.event.workflow_run.id || inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          DISPATCH_RUN_ID: ${{ inputs.run_id }}
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('bench-comment/pr-comment.md') || !fs.existsSync('bench-comment/pr-number')) {
              core.info('no comment artifact; nothing to post');
              return;
            }
            const body = fs.readFileSync('bench-comment/pr-comment.md', 'utf8');
            // The artifact names the target PR (the only thing that survives for fork PRs —
            // a fork commit isn't in this repo, so listPullRequestsAssociatedWithCommit finds
            // nothing). Trust it only after verifying that PR's head SHA matches the run's, so
            // a fork can name its own PR but never redirect the comment at another issue. On a
            // manual dispatch there is no workflow_run payload, so fetch the run's head SHA.
            let sha = context.payload.workflow_run?.head_sha;
            if (!sha) {
              const { data: run } = await github.rest.actions.getWorkflowRun({
                owner: context.repo.owner, repo: context.repo.repo,
                run_id: parseInt(process.env.DISPATCH_RUN_ID, 10),
              });
              sha = run.head_sha;
            }
            const issue_number = parseInt(fs.readFileSync('bench-comment/pr-number', 'utf8').trim(), 10);
            if (!Number.isInteger(issue_number)) {
              core.info('no valid PR number in artifact; nothing to post');
              return;
            }
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner, repo: context.repo.repo, pull_number: issue_number,
            });
            if (pr.head.sha !== sha) {
              // Either a stale run (the PR was re-pushed; a fresh run will post) or a forged
              // target. Skip quietly either way — the security property is that we never post.
              core.info(`PR #${issue_number} head ${pr.head.sha} != run head ${sha}; not posting`);
              return;
            }
            // Post a fresh comment for every bench run so the PR thread keeps the
            // full history in chronological order instead of overwriting the previous
            // result. Each comment names its PR commit and reference date, so the
            // sequence tells the story of how the numbers moved across pushes.
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo, issue_number, body,
            });
