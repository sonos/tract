name: Windows unit tests

on:
#  pull_request:
  workflow_dispatch:
  schedule:
    - cron:  '0 3 * * *'


env:
  CARGO_INCREMENTAL: false
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: true

permissions:
  contents: read

jobs:
  windows:
    strategy:
      matrix:
        os: [ windows-2022 ]
        toolchain: [ gnu, msvc ]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4
      name: Install Rustup using win.rustup.rs
      with:
        timeout_minutes: 10
        max_attempts: 8
        shell: pwsh
        command: |
            # Disable the download progress bar which can cause perf issues
            $ProgressPreference = "SilentlyContinue"
            Invoke-WebRequest https://win.rustup.rs/ -OutFile rustup-init.exe
            .\rustup-init.exe -y --default-host=x86_64-pc-windows-msvc --profile=minimal
    - uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4
      name: Install the target
      with:
        timeout_minutes: 10
        max_attempts: 8
        shell: pwsh
        command: |
            rustup toolchain add stable-x86_64-pc-windows-${{matrix.toolchain}}
            rustup default stable-x86_64-pc-windows-${{matrix.toolchain}}
    - name: Install LLVM and Clang
      uses: KyleMayes/install-llvm-action@ebc0426251bc40c7cd31162802432c68818ab8f0 # v2
      with:
        version: "11.0"
    - name: debug
      run: dir "C:\\Program Files\\LLVM"
    - name: debug lib
      run: dir "C:\\Program Files\\LLVM\\lib"
    - name: debug bin
      run: dir "C:\\Program Files\\LLVM\\bin"
    - name: top level cargo check
      run: cargo check --workspace --exclude tract-metal --exclude test-metal --exclude causal_llm
      env:
        LIBCLANG_PATH: "C:\\Program Files\\LLVM\\bin"
    - name: data / linalg / core / nnef / onnx / onnx-opl
      run: cargo test -p tract-data -p tract-linalg -p tract-core -p tract-nnef -p tract-onnx -p tract-onnx-opl
    - name: Onnx test suite
      run: |
          cargo test --release -p test-onnx-core -p test-unit-core
      env:
        TRACT_LOG: info
