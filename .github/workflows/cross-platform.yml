name: Embedded targets

on:
  pull_request:
  schedule:
    - cron:  '0 5 * * *'
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Optional PR number to test (from fork ok). Leave empty to run on selected branch."
        required: false
        type: number

env:
  CARGO_INCREMENTAL: false
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: true
  RUSTUP_TOOLCHAIN: 1.91.0

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      test_ref: ${{ steps.set.outputs.test_ref }}
      test_branch: ${{ steps.set.outputs.test_branch }}
    steps:
      - id: set
        uses: actions/github-script@v9
        with:
          script: |
            const prInput = context.payload.inputs?.pr_number;
            core.info(`Fetching PR ${prInput}`);
            if (prInput) {
              const pr = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: Number(prInput),
              });
              core.info(pr.data.head.sha);
              core.setOutput('test_ref', pr.data.head.sha);
              // Tag bundles with pr-NNNN-<head ref> so graphite can find
              // the metrics by PR number and forks with same branch name
              // don't collide.
              core.setOutput('test_branch', `pr-${prInput}-${pr.data.head.ref}`);
              return;
            }
            core.setOutput('test_ref', process.env.GITHUB_SHA);
            // Prefer GITHUB_HEAD_REF (auto-set by GH Actions on
            // internal pull_request triggers, gives the PR source
            // branch). Fall back to GITHUB_REF_NAME (the branch the
            // workflow was triggered on) for cron and for manual
            // workflow_dispatch runs without a pr_number input.
            core.setOutput('test_branch', process.env.GITHUB_HEAD_REF || process.env.GITHUB_REF_NAME || '');

  linux:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        platform:
          - raspbian
          - aarch64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu-stretch
          - armv6vfp-unknown-linux-gnueabihf
          - armv7-unknown-linux-gnueabihf
          - armv7-unknown-linux-gnueabihf-stretch
          - aarch64-unknown-linux-musl
          - cortexa53-unknown-linux-musl
          - armv7-unknown-linux-musl
          - aarch64-linux-android
          - armv7-linux-androideabi
          - i686-linux-android
          - x86_64-linux-android
          - x86_64-unknown-linux-gnu-stretch
          - wasm32-unknown-unknown
          - wasm32-wasi

    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ needs.prepare.outputs.test_ref }}
        fetch-depth: 0

    - name: Get current date
      id: date
      run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

    - name: Configure AWS Credentials
      continue-on-error: true
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: arn:aws:iam::567805100031:role/github-runner-tract-ci
        aws-region: us-east-2

    - uses: actions/cache@v5
      with:
        path: |
          ~/.rustup
          ~/.cargo/registry
          ~/.cargo/git
          #          ~/.cache/sccache
          .cached
          target
        key: ${{ runner.os }}-${{matrix.platform}}-${{steps.date.outputs.date}}

    - name: Setup wasmtime
      if: matrix.platform == 'wasm32-wasi'
      uses: bytecodealliance/actions/wasmtime/setup@v1

    - name: Cross script
      env:
        PLATFORM: ${{matrix.platform}}
        AWS_EC2_METADATA_DISABLED: true
        GITHUB_HEAD_REF: ${{ needs.prepare.outputs.test_branch }}
        GITHUB_SHA: ${{ needs.prepare.outputs.test_ref }}
      run: .travis/cross.sh

  apple:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        platform:
          - aarch64-apple-ios
          - aarch64-apple-darwin

    runs-on: macos-latest
    permissions:
      id-token: write
      contents: read

    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ needs.prepare.outputs.test_ref }}
        fetch-depth: 0

    - name: Configure AWS Credentials
      continue-on-error: true
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: arn:aws:iam::567805100031:role/github-runner-tract-ci
        aws-region: us-east-2

    - name: Get current date
      id: date
      run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

    - name: Cross script
      env:
        PLATFORM: ${{matrix.platform}}
        GITHUB_HEAD_REF: ${{ needs.prepare.outputs.test_branch }}
        GITHUB_SHA: ${{ needs.prepare.outputs.test_ref }}
      run: .travis/cross.sh
