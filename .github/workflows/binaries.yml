on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_override:
        description: version to build (default derived from tag ref)
        type: string

name: Upload Release Binaries

env:
  CARGO_INCREMENTAL: false
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: true

jobs:
  assets:
    name: Upload Release Binaries
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macOS-latest ]
        arch: [ x86_64, aarch64, armv7 ]
        include:
          - os: ubuntu-latest
            arch: x86_64
            target: x86_64-unknown-linux-musl
            musl: x86_64-linux-musl
          - os: ubuntu-latest
            arch: aarch64
            target: aarch64-unknown-linux-musl
            musl: aarch64-linux-musl
          - os: ubuntu-latest
            arch: armv7
            target: armv7-unknown-linux-musleabihf
            musl: armv7l-linux-musleabihf
          - os: macOS-latest
            arch: x86_64
            target: x86_64-apple-darwin
          - os: macOS-latest
            arch: aarch64
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            arch: x86_64-cuda13
            target: x86_64-unknown-linux-gnu
            container: quay.io/pypa/manylinux_2_28_x86_64
            name_prefix: cuda13-
        exclude:
          - os: macOS-latest
            arch: armv7

    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Extract version tag
        id: version
        run: |
          if [ -n "${{ inputs.version_override }}" ]; then
            echo "value=${{ inputs.version_override }}" >> $GITHUB_OUTPUT
          else
            echo "value=$(echo ${{ github.ref }} | cut -f 3 -d / | sed 's/^v//' )" >> $GITHUB_OUTPUT
          fi

      - name: Build tract
        run: |
          set -ex
          target=${{matrix.target}}
          version=${{steps.version.outputs.value}}
          name=${{matrix.name_prefix}}${target}-${version}

          if [ -n "${{matrix.container}}" ]
          then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
            . "$HOME/.cargo/env"
          else
            rustup update
          fi
          rustup target add ${target}

          if [ -n "${{matrix.musl}}" ]
          then
            MUSL_TRIPLE=${{matrix.musl}}
            curl -s https://s3.amazonaws.com/tract-ci-builds/toolchains/${MUSL_TRIPLE}-cross.tgz | tar zx

            MUSL_BIN=`pwd`/${MUSL_TRIPLE}-cross/bin
            export PATH=$MUSL_BIN:$PATH

            export TARGET_CC=$MUSL_BIN/${MUSL_TRIPLE}-gcc

            RUST_TRIPLE_ENV=$(echo ${target} | tr 'a-z-' 'A-Z_')
            export CARGO_TARGET_${RUST_TRIPLE_ENV}_CC=$TARGET_CC
            export CARGO_TARGET_${RUST_TRIPLE_ENV}_LINKER=$TARGET_CC
          fi

          cargo build --target ${target} --release -p tract-cli
          mkdir tract-$name
          cp target/${target}/release/tract tract-${name}
          tar czf tract-${name}.tgz tract-${name}

      - name: Upload asset
        uses: softprops/action-gh-release@v3
        with:
          files: tract-${{matrix.name_prefix}}${{matrix.target}}-${{ steps.version.outputs.value }}.tgz
          name: ${{ steps.version.outputs.value }}
          tag_name: v${{ steps.version.outputs.value }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

