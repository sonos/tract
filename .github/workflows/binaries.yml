on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_override:
        description: version to build (default derived from tag ref)
        type: string

name: Upload Release Binaries

env:
  CARGO_INCREMENTAL: false
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: true

permissions:
  contents: read

jobs:
  assets:
    name: Upload Release Binaries
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macOS-latest ]
        arch: [ x86_64, aarch64, armv7 ]
        include:
          - os: ubuntu-latest
            arch: x86_64
            target: x86_64-unknown-linux-musl
            musl: x86_64-linux-musl
          - os: ubuntu-latest
            arch: aarch64
            target: aarch64-unknown-linux-musl
            musl: aarch64-linux-musl
          - os: ubuntu-latest
            arch: armv7
            target: armv7-unknown-linux-musleabihf
            musl: armv7l-linux-musleabihf
          - os: macOS-latest
            arch: x86_64
            target: x86_64-apple-darwin
          - os: macOS-latest
            arch: aarch64
            target: aarch64-apple-darwin
        exclude:
          - os: macOS-latest
            arch: armv7

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Extract version tag
        id: version
        env:
          VERSION_OVERRIDE: ${{ inputs.version_override }}
          GH_REF: ${{ github.ref }}
        run: |
          if [ -n "$VERSION_OVERRIDE" ]; then
            echo "value=$VERSION_OVERRIDE" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(echo "$GH_REF" | cut -f 3 -d / | sed 's/^v//' )" >> "$GITHUB_OUTPUT"
          fi

      - name: Build tract
        env:
          TARGET: ${{ matrix.target }}
          MUSL: ${{ matrix.musl }}
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          set -ex
          target="$TARGET"
          version="$VERSION"
          name=${target}-${version}

          rustup update
          rustup target add ${target}

          if [ -n "$MUSL" ]
          then
            MUSL_TRIPLE="$MUSL"
            curl -s https://s3.amazonaws.com/tract-ci-builds/toolchains/${MUSL_TRIPLE}-cross.tgz | tar zx

            MUSL_BIN=`pwd`/${MUSL_TRIPLE}-cross/bin
            export PATH=$MUSL_BIN:$PATH

            export TARGET_CC=$MUSL_BIN/${MUSL_TRIPLE}-gcc

            RUST_TRIPLE_ENV=$(echo ${target} | tr 'a-z-' 'A-Z_')
            export CARGO_TARGET_${RUST_TRIPLE_ENV}_CC=$TARGET_CC
            export CARGO_TARGET_${RUST_TRIPLE_ENV}_LINKER=$TARGET_CC
          fi

          cargo build --target ${target} --release -p tract-cli
          mkdir tract-$name
          cp target/${target}/release/tract tract-${name}
          tar czf tract-${name}.tgz tract-${name}

      - name: Upload asset
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          files: tract-${{matrix.target}}-${{ steps.version.outputs.value }}.tgz
          name: ${{ steps.version.outputs.value }}
          tag_name: v${{ steps.version.outputs.value }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

