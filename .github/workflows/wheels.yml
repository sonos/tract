name: Python wheels

on:
  schedule:
    - cron:  '0 3 * * MON'
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: force publish to pypi
        type: boolean
      pypi_version_override:
        description: override version id detection
        type: string
      pr_number:
        description: "Optional PR number to build (from fork ok). Leave empty to build the selected branch."
        required: false
        type: number


env:
  CARGO_INCREMENTAL: false
  PYPI_VERSION_OVERRIDE: ${{ inputs.pypi_version_override }}
  CIBW_ENVIRONMENT_PASS_LINUX: "PYPI_VERSION_OVERRIDE"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: true
  MACOSX_DEPLOYMENT_TARGET: 10.13

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      statuses: write
    outputs:
      test_ref: ${{ steps.set.outputs.test_ref }}
      pr_sha: ${{ steps.set.outputs.pr_sha }}
    steps:
      - id: set
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const prInput = context.payload.inputs?.pr_number;
            if (!prInput) {
              // Build the ref the workflow was triggered on (branch/tag/SHA in base repo).
              core.setOutput('test_ref', process.env.GITHUB_SHA);
              core.setOutput('pr_sha', '');
              return;
            }
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: Number(prInput),
            });
            const sha = pr.data.head.sha;
            core.setOutput('test_ref', sha);
            core.setOutput('pr_sha', sha);
            const target_url = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state: 'pending',
              context: 'wheels (dispatched)',
              target_url,
              description: 'Wheel build running…',
            });

  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    needs: prepare
    runs-on: ${{ matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-2022, macos-14]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.test_ref }}
          persist-credentials: false

      - name: Setup | Rust
        shell: bash
        run: rustup toolchain install # channel + components from rust-toolchain.toml

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false

      - name: Install rust toolchains
        if: startsWith(matrix.os, 'macOS')
        run: rustup target install x86_64-apple-darwin aarch64-apple-darwin

      - name: Build wheels
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          max_attempts: 1
          timeout_seconds: 54000 # 15 hours :/
          command: uvx cibuildwheel --output-dir wheelhouse api/py

      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Inject CycloneDX + SPDX SBOMs into wheels (PEP 770)
        shell: bash
        run: |
          set -ex
          uv pip install --system wheel
          for w in wheelhouse/*.whl ; do
            python .github/scripts/inject_wheel_sboms.py "$w"
          done

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-${{github.run_id}}-${{matrix.os}}
          path: ./wheelhouse/*.whl

  make_sdist:
    name: Make SDist
    needs: prepare
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        ref: ${{ needs.prepare.outputs.test_ref }}
        persist-credentials: false

    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      with:
        enable-cache: false

    - name: Build SDist
      run: cd api/py && uv build --sdist

    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: wheels-${{github.run_id}}-src
        path: api/py/dist/*.tar.gz

  pr_status:
    name: Report wheel status to PR
    needs: [prepare, build_wheels, make_sdist]
    if: ${{ always() && needs.prepare.outputs.pr_sha != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          PR_SHA: ${{ needs.prepare.outputs.pr_sha }}
          WHEELS_RESULT: ${{ needs.build_wheels.result }}
          SDIST_RESULT: ${{ needs.make_sdist.result }}
        with:
          script: |
            const ok = process.env.WHEELS_RESULT === 'success'
              && process.env.SDIST_RESULT === 'success';
            const target_url = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: process.env.PR_SHA,
              state: ok ? 'success' : 'failure',
              context: 'wheels (dispatched)',
              target_url,
              description: ok ? 'Wheels built' : 'Wheel build failed',
            });

  upload_all:
    needs: [build_wheels, make_sdist]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || inputs.publish

    steps:
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        pattern: wheels-${{github.run_id}}-*
        merge-multiple: true
        path: dist

    - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
      with:
        verbose: true
