name: Python wheels

on:
  schedule:
    - cron:  '0 3 * * MON'
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: force publish to pypi
        type: boolean
      pypi_version_override:
        description: override version id detection
        type: string


env:
  CARGO_INCREMENTAL: false
  PYPI_VERSION_OVERRIDE: ${{ inputs.pypi_version_override }}
  CIBW_ENVIRONMENT_PASS_LINUX: "PYPI_VERSION_OVERRIDE"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: true
  MACOSX_DEPLOYMENT_TARGET: 10.13

permissions:
  contents: read

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-2022, macos-14]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
        
      - name: Setup | Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false

      - name: Install rust toolchains
        if: startsWith(matrix.os, 'macOS')
        run: rustup target install x86_64-apple-darwin aarch64-apple-darwin

      - name: Build wheels
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4
        with:
          max_attempts: 1
          timeout_seconds: 54000 # 15 hours :/
          command: uvx cibuildwheel --output-dir wheelhouse api/py

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: wheels-${{github.run_id}}-${{matrix.os}}
          path: ./wheelhouse/*.whl

  make_sdist:
    name: Make SDist
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        persist-credentials: false

    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        enable-cache: false

    - name: Build SDist
      run: cd api/py && uv build --sdist

    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: wheels-${{github.run_id}}-src
        path: api/py/dist/*.tar.gz

  upload_all:
    needs: [build_wheels, make_sdist]
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || inputs.publish

    steps:
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        pattern: wheels-${{github.run_id}}-*
        merge-multiple: true
        path: dist

    - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
      with:
        user: __token__
        password: ${{ secrets.PYPI }}
        verbose: true
