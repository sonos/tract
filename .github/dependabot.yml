version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      actions:
        patterns:
          - "*"
    cooldown:
      default-days: 7

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      rust-dependencies:
        patterns:
          - "*"
    cooldown:
      default-days: 7

  - package-ecosystem: "pip"
    directory: "/api/py"
    ignore:
      # Only update them manually since updating them might break compatibility
      - dependency-name: "numpy"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 7
