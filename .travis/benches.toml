# Bench manifest for `tract bench-suite`. Each [[bench]] becomes one fresh child
# process per run; backend-less benches run once on CPU labelled by `variant`,
# benches with `backends` run once per available backend labelled by the backend.
# Ported from bundle-entrypoint.sh.

base_url = "https://tract-ci-builds.s3.amazonaws.com/model"

# --- net benches (CPU) ---

[[bench]]
kind = "net"
name = "arm_ml_kws_cnn_m"
variant = "pass"
model = "ARM-ML-KWS-CNN-M.pb"
args = "-i 49,10,f32 --partial --input-node Mfcc"

