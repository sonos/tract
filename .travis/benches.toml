# --- LLM + transformer benches (per available backend) ---

[[bench]]
kind = "llm"
name = "llama-3_2-1B-q40ef32-516"
model = "Llama-3.2-1B-q40ef32.516.nnef.tgz"
backends = ["cpu", "metal", "cuda"]

[[bench]]
kind = "llm"
name = "openelm-270M-q40ef16-516"
model = "OpenELM-270M-q40ef16.516.nnef.tgz"
backends = ["cpu", "metal", "cuda"]

[[bench]]
kind = "llm"
name = "llama-3_2-1B-instruct-q40ef16-541"
model = "Llama-3.2-1B-Instruct-q40ef16.541.nnef.tgz"
backends = ["cpu", "metal", "cuda"]

[[bench]]
kind = "llm"
name = "openelm-270M-q40ef16-541"
model = "OpenELM-270M-q40ef16.541.nnef.tgz"
backends = ["cpu", "metal", "cuda"]

[[bench]]
kind = "net"
name = "parakeet-tdt-600m-v3-f32f32-preprocessor_1s"
model = "parakeet-tdt-0.6b-v3-f32f32.608.preprocessor.nnef.tgz"
args = "-t transformers_detect_all --nnef-tract-transformers --set B=1 --set A=16000"
backends = ["cpu", "metal", "cuda"]

[[bench]]
kind = "net"
name = "parakeet-tdt-600m-v3-f32f32-encoder_1s"
model = "parakeet-tdt-0.6b-v3-f32f32.608.encoder.p1.nnef.tgz"
args = "-t transformers_detect_all --nnef-tract-transformers --set B=1 --set S=100"
backends = ["cpu", "metal", "cuda"]

[[bench]]
kind = "net"
name = "parakeet-tdt-600m-v3-f32f32-decoder_pass"
model = "parakeet-tdt-0.6b-v3-f32f32.608.decoder.nnef.tgz"
args = "-t transformers_detect_all --nnef-tract-transformers --set B=1 --set T=1"
backends = ["cpu", "metal", "cuda"]

[[bench]]
kind = "net"
name = "parakeet-tdt-600m-v3-f32f32-joint_pass"
model = "parakeet-tdt-0.6b-v3-f32f32.608.joint.nnef.tgz"
args = "-t transformers_detect_all --nnef-tract-transformers --set B=1 --set R=1 --set U=1"
backends = ["cpu", "metal", "cuda"]

